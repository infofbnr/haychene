<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Hay Chene</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link rel="icon" href="hayshor.png">

  <script async
    src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3792925504821588"
    crossorigin="anonymous">
  </script>

  <style>
    .glass {
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
  </style>

</head>

<body class="bg-zinc-950 text-zinc-100 min-h-screen overflow-x-hidden">

  <div class="fixed inset-0 -z-10 overflow-hidden">
    <div class="absolute top-0 left-0 w-[500px] h-[500px] bg-rose-500/20 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-orange-500/20 rounded-full blur-3xl"></div>
  </div>

  <header class="sticky top-0 z-50 border-b border-white/10 bg-zinc-950/80 glass">


<div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">


  <div class="flex items-center gap-3">

    <div class="w-10 h-10 rounded-xl overflow-hidden border border-white/10">
      <img
        src="hayshor.png"
        alt="Hay Chene"
        class="w-full h-full object-cover"
      >
    </div>

    <div>
      <h1 class="font-bold">
        Hay Chene
      </h1>

      <p class="text-xs text-zinc-400">
        Anonymous Armenian Chat
      </p>
    </div>

  </div>

  <button
    id="whatsappToggle"
    class="w-10 h-10 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition flex items-center justify-center"
  >
    <img
      src="pictures/logo.png"
      alt="WhatsApp"
      class="w-6 h-6"
    >
  </button>

</div>


  </header>

  <aside
    id="sidebar"
    class="hidden fixed left-0 top-0 h-full w-72 bg-zinc-900/95 border-r border-white/10 z-50 glass"
  >

  </aside>

  <section class="max-w-5xl mx-auto px-6 pt-10 text-center">

<div class="w-36 h-36 mx-auto rounded-[2rem] overflow-hidden border border-white/10 bg-white/5 shadow-2xl">
  <img
    src="hayshor.png"
    alt="Hay Chene"
    class="w-full h-full object-cover"
  >
</div>

<h1 class="mt-8 text-5xl font-black tracking-tight">
  Hay Chene
</h1>

<p class="mt-4 text-zinc-400 max-w-2xl mx-auto">
  Khosetsek irar hed. <b><u>SHORE ARKILVADSE</u></b>.
</p>


  </section>

  <main class="max-w-4xl mx-auto px-6 py-10">

<section
  class="
    rounded-3xl
    border
    border-white/10
    bg-white/5
    glass
    p-6
    shadow-2xl
  "
>

  <div class="flex items-center justify-between mb-6">

    <h2 class="text-2xl font-bold">
      💬 Discussion
    </h2>

    <span class="px-3 py-1 rounded-full bg-rose-500/10 text-rose-300 text-xs border border-rose-500/20">
      Anonymous
    </span>

  </div>

  <div
    id="chatMessages"
    class="
      h-[500px]
      overflow-y-auto
      rounded-3xl
      border
      border-white/10
      bg-black/20
      p-5
      space-y-4
    "
  >
  </div>

  <div
    id="replyIndicator"
    class="text-sm text-rose-300 mt-4 hidden"
  ></div>

  <div class="mt-5 flex gap-3">

    <input
      id="chatInput"
      type="text"
      placeholder="Share something..."
      class="
        flex-1
        px-5
        py-4
        rounded-2xl
        bg-white/5
        border
        border-white/10
        focus:border-rose-500
        outline-none
      "
    >

    <button
      onclick="submitMessage()"
      id="sendBtn"
      class="
        px-8
        rounded-2xl
        bg-rose-500
        hover:bg-rose-400
        text-white
        font-bold
        transition
      "
    >
      Send
    </button>

  </div>

  <div
    id="voiceControls"
    class="mt-5 flex flex-wrap items-center gap-3"
  >

    <button
      id="recordBtn"
      class="
        px-5
        py-3
        rounded-2xl
        bg-orange-500
        hover:bg-orange-400
        transition
        font-semibold
      "
    >
      🎙️ Record
    </button>

    <audio
      id="audioPreview"
      controls
      class="
        hidden
        rounded-2xl
      "
    ></audio>

    <button
      id="sendAudioBtn"
      class="
        hidden
        px-5
        py-3
        rounded-2xl
        bg-emerald-500
        hover:bg-emerald-400
        transition
        font-semibold
      "
    >
      Send Voice
    </button>

  </div>

</section>

  </main>

  <script type="module" src="script.js"></script>

</body>
</html>
